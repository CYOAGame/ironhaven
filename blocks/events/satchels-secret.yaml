id: satchels_secret
name: The Satchel's Secret
tags:
  - intrigue
  - social
storyline: traveler_mystery
chapter: 2
reentry_recap: "Days have passed since you hid the traveler. They sent word this morning, asking to meet."
escalation:
  chance_base: 0.2
  advances_to: strangers_asking
  world_facts_set:
    satchel_opened: true

preconditions:
  - type: world_fact
    key: traveler_hidden
    value: true

roles:
  - id: traveler
    label: The Hidden Traveler
    traitRequirements:
      cunning:
        min: 3
  - id: widow
    label: The Miller's Widow
    archetypeFilter:
      - farmer
      - merchant

entryNodeId: start

nodes:
  start:
    id: start
    text: >-
      You find {traveler.name} where you left them, or close to it. They look steadier now,
      though their hands still move restlessly. "I owe you an explanation," they say. The
      satchel is on the table. They do not open it immediately. They study you first, making
      a decision you can see being made. Then they open it. Inside, wrapped in oilcloth:
      a sheaf of letters bearing a noble crest, correspondence between someone in this town
      and someone who should be an enemy.
    choices:
      - id: read_carefully
        label: Ask to read the letters yourself, carefully
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: world_fact
            target: satchel_opened
            value: true
        exhaustionCost: 1
        nextNodeId: reading_the_letters
      - id: let_them_explain
        label: Let {traveler.name} explain what you are looking at before touching anything
        consequences:
          - type: relationship
            target: '{traveler.id}'
            value: 1
            axis: trust
        exhaustionCost: 1
        nextNodeId: traveler_explains_contents
      - id: ask_about_the_crest
        label: Focus on the crest, ask whose seal that is
        consequences:
          - type: stat
            target: cunning
            value: 1
        exhaustionCost: 1
        nextNodeId: crest_identified
      - id: back_out
        label: This is too dangerous. Tell them to find another way.
        consequences:
          - type: relationship
            target: '{traveler.id}'
            value: -2
            axis: trust
        exhaustionCost: 0
        nextNodeId: backing_out

  backing_out:
    id: backing_out
    text: >-
      {traveler.name} says nothing for a moment. When they speak, their voice is flat.
      "I understand." They begin to repack the oilcloth with methodical care. There is no
      anger, which is somehow worse than anger. "I thought you were someone who did not
      flinch at inconvenient things." They close the satchel. They are already planning
      their next move without you.
    choices:
      - id: reconsider
        label: Reconsider. You said you were out, but you are still here.
        consequences:
          - type: relationship
            target: '{traveler.id}'
            value: 1
            axis: trust
        exhaustionCost: 0
        nextNodeId: traveler_explains_contents
      - id: firm_refusal
        label: Stay firm. Wish them well and leave.
        consequences:
          - type: world_fact
            target: abandoned_traveler
            value: true
        exhaustionCost: 0
        nextNodeId: null

  reading_the_letters:
    id: reading_the_letters
    text: >-
      The letters are written in a careful hand, formal and circumspect, but the meaning
      is clear enough to someone paying attention. Money moved. Favors exchanged. A name
      in Ironhaven and a name from outside, referring to arrangements that should not
      exist between those two parties. The final letter mentions a shipment, a date, and
      the words "as agreed before the vote." Your hands are steady as you reseal the oilcloth.
      Your understanding of this town has just changed shape.
    choices:
      - id: identify_local_name
        label: Ask {traveler.name} to confirm who the local name belongs to
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: world_fact
            target: satchel_opened
            value: true
        exhaustionCost: 1
        nextNodeId: name_confirmed
      - id: ask_what_vote
        label: Ask about the vote mentioned in the last letter
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: world_fact
            target: satchel_opened
            value: true
        exhaustionCost: 1
        nextNodeId: vote_context

  traveler_explains_contents:
    id: traveler_explains_contents
    text: >-
      {traveler.name} speaks in a low, rapid voice. The letters document a systematic
      fraud running through three towns. Money diverted from the road-tax fund, the
      building fund for the new mill, and charitable donations, all flowing to a single
      account. The account holder is a name with standing in Ironhaven, someone whose
      generosity is publicly praised. "They sent men when I copied the ledgers," the
      traveler says. "A day behind me, at most. Maybe less now."
    choices:
      - id: ask_about_the_men
        label: Ask about the men following them, specifically
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: world_fact
            target: fraud_documents_known
            value: true
        exhaustionCost: 1
        nextNodeId: pursuers_detail
      - id: ask_what_they_need
        label: Set aside the who and the why. Ask what they need from you right now.
        consequences:
          - type: relationship
            target: '{traveler.id}'
            value: 1
            axis: affection
          - type: world_fact
            target: fraud_documents_known
            value: true
        exhaustionCost: 0
        nextNodeId: delivery_options

  crest_identified:
    id: crest_identified
    text: >-
      {traveler.name} tells you. The crest belongs to a merchant house three towns east,
      one with connections to the regional trade council. You know the name by reputation:
      respectable, old, politically careful. The fact that they are in correspondence with
      someone in Ironhaven using this kind of language means either they are reckless or
      they do not believe anyone will ever find these letters. They were almost right.
    choices:
      - id: ask_local_name_now
        label: Ask who in Ironhaven the letters were addressed to
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: world_fact
            target: satchel_opened
            value: true
        exhaustionCost: 1
        nextNodeId: name_confirmed
      - id: ask_how_traveler_got_them
        label: Ask how {traveler.name} came to have them in the first place
        consequences:
          - type: relationship
            target: '{traveler.id}'
            value: 1
            axis: trust
        exhaustionCost: 1
        nextNodeId: traveler_explains_contents

  name_confirmed:
    id: name_confirmed
    text: >-
      {traveler.name} says the name quietly, as if it weighs something. You recognize it.
      It is the kind of name attached to good works: a repaired bridge, a winter relief fund,
      a donation to the chapel roof. Someone who has spent years building a reputation that
      now sits on a fraudulent foundation. You find yourself checking your own memory for
      moments when you trusted that reputation and wondering how much of your judgment
      was manufactured.
    choices:
      - id: believe_it_fully
        label: Believe it. The evidence is in your hands.
        consequences:
          - type: world_fact
            target: knows_merchant_secret
            value: true
          - type: world_fact
            target: fraud_documents_known
            value: true
          - type: relationship
            target: '{traveler.id}'
            value: 2
            axis: trust
        exhaustionCost: 0
        nextNodeId: decision_point
      - id: express_skepticism
        label: Say the name surprises you. Ask if the evidence is conclusive.
        consequences:
          - type: stat
            target: cunning
            value: 1
        exhaustionCost: 1
        nextNodeId: evidence_questioned

  vote_context:
    id: vote_context
    text: >-
      {traveler.name} takes a breath. "There is a vote scheduled. Guild levies on imported
      goods, which sounds dry until you realize the import network is partly owned by the
      same account that has been draining the road fund. The vote would free them from
      oversight. If it passes, the diversion becomes legal, more or less." They look at the
      letters. "These were written before someone realized the wrong clerk had access to the
      correspondence files."
    choices:
      - id: understand_stakes
        label: Say you understand the stakes and ask what needs to happen before the vote
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: world_fact
            target: fraud_documents_known
            value: true
        exhaustionCost: 1
        nextNodeId: delivery_options
      - id: vote_timing_matters
        label: Ask when exactly the vote is scheduled
        consequences:
          - type: stat
            target: cunning
            value: 1
        exhaustionCost: 1
        nextNodeId: delivery_options

  pursuers_detail:
    id: pursuers_detail
    text: >-
      "Two of them," {traveler.name} says. "They do not wear livery but they work for the
      account holder. I have seen them before, at the counting house. Patient men. The kind
      that do not stop." A pause. "They will not come into town armed and obvious. They will
      ask questions politely until they find what they need. They have coin and they will use it."
      The implication settles: someone in Ironhaven will talk, given enough silver.
    choices:
      - id: think_about_who_might_talk
        label: Think about who in town would accept coin for information
        consequences:
          - type: stat
            target: cunning
            value: 2
          - type: world_fact
            target: riders_expected
            value: true
        exhaustionCost: 1
        nextNodeId: delivery_options
      - id: go_straight_to_widow
        label: There is no time to spare. Get the documents to the miller's widow now.
        preconditions:
          - type: world_fact
            key: millers_widow_contacted
            value: true
        consequences:
          - type: stat
            target: charisma
            value: 1
          - type: world_fact
            target: satchel_delivered
            value: true
        exhaustionCost: 3
        nextNodeId: widow_scene

  evidence_questioned:
    id: evidence_questioned
    text: >-
      {traveler.name} spreads the oilcloth on the table and points, specifically. Three
      ledger pages with matching figures. Two letters with the same counter-signature.
      A third document, a receipt, with a date that matches an entry in the road fund
      accounts marked "miscellaneous expenses." They do not lecture. They let the paper speak.
      After a moment you stop questioning and start reading.
    choices:
      - id: convinced_now
        label: You are convinced. Ask what to do with it.
        consequences:
          - type: world_fact
            target: fraud_documents_known
            value: true
          - type: world_fact
            target: knows_merchant_secret
            value: true
        exhaustionCost: 0
        nextNodeId: decision_point
      - id: copy_one_document
        label: Ask to make a copy of the most damning page, in case the satchel is taken
        consequences:
          - type: stat
            target: cunning
            value: 2
          - type: world_fact
            target: fraud_documents_known
            value: true
          - type: world_fact
            target: documents_copied
            value: true
        exhaustionCost: 2
        nextNodeId: decision_point

  decision_point:
    id: decision_point
    text: >-
      {traveler.name} repacks the satchel and clasps it shut. "So. You know what is in here.
      Now you know the same things I know and you carry the same risk." They look at you
      without apology. "What do you want to do with it?" The question is genuine. They are
      not certain they know the right answer themselves.
    choices:
      - id: help_deliver
        label: Help deliver the documents to someone with authority to act
        consequences:
          - type: stat
            target: charisma
            value: 1
          - type: relationship
            target: '{traveler.id}'
            value: 3
            axis: trust
          - type: world_fact
            target: satchel_delivered
            value: true
        exhaustionCost: 2
        nextNodeId: delivery_options
      - id: use_as_leverage
        label: Hold the knowledge. Information like this has value before it is spent.
        consequences:
          - type: stat
            target: cunning
            value: 2
          - type: world_fact
            target: knows_merchant_secret
            value: true
        exhaustionCost: 1
        nextNodeId: leverage_considered
      - id: report_to_guard
        label: Take it to the town guard. This is beyond what two people can manage.
        consequences:
          - type: faction
            target: town_guard
            value: 3
          - type: world_fact
            target: merchant_denounced
            value: true
        exhaustionCost: 2
        nextNodeId: guard_option
      - id: send_traveler_on
        label: Give them the clearest road out and let them carry it themselves
        consequences:
          - type: relationship
            target: '{traveler.id}'
            value: 1
            axis: respect
        exhaustionCost: 1
        nextNodeId: traveler_leaves_alone

  delivery_options:
    id: delivery_options
    text: >-
      {traveler.name} names the miller's widow: a former magistrate's clerk, retired to
      the east road, known to be careful and incorruptible. "She will know the right
      channel," the traveler says. "She has done this before, or something like it."
      There is also the question of how to get there. The riders could be in town by noon.
    choices:
      - id: go_to_widow_now
        label: Go to the widow now, directly, before the riders arrive
        consequences:
          - type: world_fact
            target: millers_widow_contacted
            value: true
          - type: world_fact
            target: satchel_delivered
            value: true
        exhaustionCost: 2
        nextNodeId: widow_scene
      - id: send_a_note_first
        label: Send word ahead to the widow before moving the satchel
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: world_fact
            target: millers_widow_contacted
            value: true
        exhaustionCost: 1
        nextNodeId: widow_scene
      - id: hide_documents_first
        label: Hide the documents in a second location before going to the widow
        consequences:
          - type: stat
            target: cunning
            value: 2
          - type: world_fact
            target: documents_hidden
            value: true
        exhaustionCost: 2
        nextNodeId: widow_scene

  leverage_considered:
    id: leverage_considered
    text: >-
      You sit with the idea. The name on those documents is a person with influence, with
      connections, with the capacity to make things easier or harder for people who live
      in this town. That is also a vulnerability. But leverage only works if the other
      person knows you have it, and making that known is a different kind of risk than
      simply turning evidence over to the law.
    choices:
      - id: approach_the_named_person
        label: Approach the named person yourself, quietly, to see how they react
        consequences:
          - type: stat
            target: cunning
            value: 2
          - type: world_fact
            target: knows_merchant_secret
            value: true
          - type: world_fact
            target: fraud_leveraged
            value: true
        exhaustionCost: 3
        nextNodeId: null
      - id: reconsider_delivery
        label: Think better of it. Use the information, not the leverage. Deliver it properly.
        consequences:
          - type: world_fact
            target: satchel_delivered
            value: true
        exhaustionCost: 1
        nextNodeId: delivery_options

  guard_option:
    id: guard_option
    text: >-
      {traveler.name} goes still. "The guard captain?" A pause while they weigh something.
      "If the captain is clean, that works. If they are not, we have handed the documents
      to the wrong people." They look at you. "Do you know the captain? Enough to trust them?"
      The question is fair. You think about what you actually know.
    choices:
      - id: vouch_for_captain
        label: Say yes, the captain can be trusted, and go
        consequences:
          - type: faction
            target: town_guard
            value: 3
          - type: world_fact
            target: merchant_denounced
            value: true
        exhaustionCost: 2
        nextNodeId: null
      - id: admit_uncertainty
        label: Admit you are not certain. Suggest going to the widow instead.
        consequences:
          - type: stat
            target: cunning
            value: 1
        exhaustionCost: 0
        nextNodeId: delivery_options

  traveler_leaves_alone:
    id: traveler_leaves_alone
    text: >-
      {traveler.name} nods, slowly. They understand. They shoulder the satchel with the
      practiced ease of someone who has been carrying it for a long time and pack their
      few other things with quiet efficiency. At the door they turn. "If it comes out
      anyway, and it will, someone might come asking what you knew and when." They say
      it without accusation. Just as information. Then they go.
    choices:
      - id: watch_them_go
        label: Watch them leave and close the door behind them
        consequences:
          - type: world_fact
            target: traveler_gone
            value: true
        exhaustionCost: 0
        nextNodeId: null
      - id: change_mind_follow
        label: Follow them. You cannot let them face this alone.
        consequences:
          - type: relationship
            target: '{traveler.id}'
            value: 3
            axis: affection
          - type: world_fact
            target: escorting_traveler
            value: true
        exhaustionCost: 3
        nextNodeId: widow_scene

  widow_scene:
    id: widow_scene
    text: >-
      The miller's widow lives at the end of a lane that smells of old sawdust and
      woodsmoke. She opens the door before you knock, as if she heard something
      approaching that you did not. She is in her sixties, unhurried, and her eyes move
      to the satchel immediately. "Come in," she says. "I was wondering when someone would
      show up with one of those." She closes the door firmly and puts a kettle on.
    choices:
      - id: give_everything
        label: Give her the satchel and everything you know
        consequences:
          - type: faction
            target: village_folk
            value: 2
          - type: world_fact
            target: satchel_delivered
            value: true
          - type: world_fact
            target: fraud_documents_known
            value: true
        exhaustionCost: 1
        nextNodeId: widow_takes_action
      - id: ask_what_she_means
        label: Ask what she means by wondering when someone would show up
        consequences:
          - type: stat
            target: cunning
            value: 1
        exhaustionCost: 1
        nextNodeId: widow_knows_more

  widow_knows_more:
    id: widow_knows_more
    text: >-
      She pours the tea with steady hands. "I was a magistrate's clerk for eleven years.
      This is not the first time documents have needed to travel quietly." She does not
      elaborate on the others. "The name you are going to tell me, I suspect I already know
      it. I have been watching the fund accounts for three years, waiting for someone
      to notice." She sits. "Tell me what you have and I will tell you what I know."
    choices:
      - id: full_exchange
        label: Tell her everything. Accept what she knows in return.
        consequences:
          - type: faction
            target: village_folk
            value: 3
          - type: world_fact
            target: satchel_delivered
            value: true
          - type: world_fact
            target: fraud_documents_known
            value: true
          - type: stat
            target: cunning
            value: 1
        exhaustionCost: 1
        nextNodeId: widow_takes_action
      - id: ask_her_to_go_first
        label: Ask her to share what she knows before you open the satchel
        consequences:
          - type: stat
            target: cunning
            value: 2
        exhaustionCost: 1
        nextNodeId: widow_takes_action

  widow_takes_action:
    id: widow_takes_action
    text: >-
      The widow examines the documents with the focused attention of someone who has
      read a great many documents in poor light. She asks two precise questions and
      makes two small marks on a piece of paper. Then she looks up. "This is sufficient.
      I know the right person to send it to. It will take four days, possibly five.
      In the meantime, the traveler should not be seen in town and neither should you,
      if you can help it." She folds the paper and tucks it into her apron. "Go home.
      Stay unremarkable."
    choices:
      - id: trust_the_widow
        label: Thank her and go. Trust the process.
        consequences:
          - type: faction
            target: village_folk
            value: 1
          - type: world_fact
            target: fraud_exposed
            value: true
        exhaustionCost: 0
        nextNodeId: null
      - id: ask_to_be_involved
        label: Ask if there is anything you should do in the next four days
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: world_fact
            target: pursuing_ironhaven_fraud
            value: true
        exhaustionCost: 1
        nextNodeId: null
      - id: warn_about_riders
        label: Warn her about the riders who came looking
        consequences:
          - type: world_fact
            target: riders_reported
            value: true
          - type: faction
            target: village_folk
            value: 1
        exhaustionCost: 1
        nextNodeId: null

  the_waiting:
    id: the_waiting
    text: >-
      The next three days are the uncomfortable work of waiting. You have done what you
      can. The documents are moving through the widow's channels, or they are in hiding,
      or they are in the hands of the guard. Whatever the case, the result is not yet
      visible. You go about your days in Ironhaven with the awareness that something is
      in motion under the surface of ordinary things. The town looks the same. It is not.
    choices:
      - id: check_on_traveler
        label: Check on {traveler.name} and see how they are holding up
        consequences:
          - type: relationship
            target: '{traveler.id}'
            value: 1
            axis: affection
        exhaustionCost: 1
        nextNodeId: traveler_in_waiting
      - id: watch_for_riders
        label: Keep an eye on the roads. The riders may come back.
        consequences:
          - type: stat
            target: cunning
            value: 1
          - type: world_fact
            target: riders_expected
            value: true
        exhaustionCost: 1
        nextNodeId: null
      - id: speak_to_named_person
        label: Consider approaching the person named in the documents, carefully
        preconditions:
          - type: world_fact
            key: knows_merchant_secret
            value: true
        consequences:
          - type: stat
            target: cunning
            value: 2
          - type: world_fact
            target: fraud_leveraged
            value: true
        exhaustionCost: 3
        nextNodeId: null

  before_the_widow:
    id: before_the_widow
    text: >-
      Before going to the widow, you stand for a moment in the lane outside and consider
      what you are about to do. You are carrying knowledge that is now in the possession
      of at least two people, possibly more. Each additional person who knows increases
      the exposure and also the probability that something actually changes. The widow
      is the person who, according to {traveler.name}, knows how to turn evidence into
      consequence. That is a different skill from simply knowing.
    choices:
      - id: go_in_and_commit
        label: Go in and commit fully to what you know and what you are bringing
        consequences:
          - type: stat
            target: charisma
            value: 1
        exhaustionCost: 0
        nextNodeId: widow_scene
      - id: send_traveler_ahead
        label: Send {traveler.name} ahead first. Let them make the introduction.
        preconditions:
          - type: world_fact
            key: escorting_traveler
            value: true
        consequences:
          - type: relationship
            target: '{traveler.id}'
            value: 1
            axis: trust
        exhaustionCost: 1
        nextNodeId: widow_scene

  traveler_in_waiting:
    id: traveler_in_waiting
    text: >-
      {traveler.name} is managing. They have always been managing. When you visit they
      are reading something, or sharpening a small knife, or staring at a wall with the
      focused expression of someone running through contingencies. "I have done this
      before," they say, not quite boasting, not quite reassuring. "Not with these specific
      documents, but this kind of waiting. The worst part is not knowing which direction
      the thing comes from when it moves." They look at you. "Thank you for checking."
    choices:
      - id: offer_to_stay
        label: Offer to stay for a while
        consequences:
          - type: relationship
            target: '{traveler.id}'
            value: 2
            axis: affection
        exhaustionCost: 1
        nextNodeId: null
      - id: leave_them_to_it
        label: Leave them to it. They have this under control.
        consequences:
          - type: relationship
            target: '{traveler.id}'
            value: 1
            axis: respect
        exhaustionCost: 0
        nextNodeId: null
